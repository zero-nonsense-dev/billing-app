
# GitHub App Manifest (paste into "Create with Manifest")
name: Zero Nonsense Licenser
url: https://zerononsense.dev
hook_attributes:
  url: https://zerononsense.dev/api/webhook
redirect_url: https://zerononsense.dev/installed
callback_urls:
